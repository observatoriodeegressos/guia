name: Build PDF and Publish Release

# Roda automaticamente depois que o deploy do site no Pages conclui com sucesso
# (assim o PDF e gerado a partir do conteudo ja publicado). Tambem pode ser
# disparado manualmente em Actions.
on:
  workflow_run:
    workflows: ["Deploy Jekyll site to Pages"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    # so executa se o deploy do Pages tiver dado certo (ou se for disparo manual)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install wkhtmltopdf
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wkhtmltopdf

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate merged PDF
        env:
          SITE_BASE_URL: "https://alesmelo74.github.io/guiaobservatorio/"
        run: python get_sites.py

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: merged_site
          path: temp_pdfs/merged_site.pdf

      - name: Publish PDF to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pdf-latest
          name: "Versão PDF (mais recente)"
          body: "PDF consolidado gerado automaticamente a partir do site publicado."
          files: temp_pdfs/merged_site.pdf
